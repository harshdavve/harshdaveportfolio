const BASE = 'https://sports.bzzoiro.com/api/v2';

{name:'Bukayo Saka', short:'Saka', nation:'England', pos:'RW', num:7, gold:true},
{name:'Gabriel Jesus', short:'Jesus', nation:'Brazil', pos:'ST', num:9, gold:true},

{name:'Viktor Gyökeres', short:'Gyökeres', nation:'Sweden', pos:'ST', num:14, gold:true},
{name:'Leandro Trossard', short:'Trossard', nation:'Belgium', pos:'LW', num:19, gold:true},
{name:'Noni Madueke', short:'Madueke', nation:'England', pos:'RW', num:20, gold:true},
{name:'Kai Havertz', short:'Havertz', nation:'Germany', pos:'ST', num:29, gold:true}
];

const STATUS_COLOR = {playing:'#4cff8f',benched:'#f5a623',injured:'#ff3333',nomatch:'#555'};
const PLAYER_IMAGES = {
  'Saka': 'assets/players/saka.png'
};
const ARSENAL_TEAM_ID = 13;
const PL_LEAGUE_ID = 2;

let mode = 'worldcup';
let allCards = [];
let currentFilter = 'all';
let refreshTimer = null;

function today() { return new Date().toISOString().split('T')[0]; }

async function get(path) {
  const r = await fetch(`${BASE}${path}`, {headers: H});
  if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${path}`);
  return r.json();
}

function showLoading() {
  document.getElementById('grid').innerHTML = `<div class="loading-wrap" style="grid-column:1/-1"><div class="loading-txt">Fetching live data</div><div class="loadbar"><div class="loadfill"></div></div></div>`;
}

function switchMode(m) {
  mode = m;
  document.getElementById('tab-wc').classList.toggle('active', m==='worldcup');
  document.getElementById('tab-pl').classList.toggle('active', m==='premier-league');
  document.getElementById('modeLabel').textContent = m==='worldcup' ? 'World Cup 2026 — Player Tracker' : 'Premier League — Player Tracker';
  document.querySelectorAll('.fbtn').forEach((b,i) => b.classList.toggle('active', i===0));
  currentFilter = 'all';
  clearInterval(refreshTimer);
  showLoading();
  loadData();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function nameMatch(playerObj, nameStr) {
  if (!nameStr) return false;
  const n = nameStr.toLowerCase();
  const tokens = playerObj.name.toLowerCase().split(' ').filter(w => w.length > 3);
  return tokens.some(w => n.includes(w)) || n.includes(playerObj.short.toLowerCase());
}

async function loadData() {
  const td = today();
  document.getElementById('dateVal').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('matchBannerWrap').innerHTML = '';
  document.getElementById('infoBannerWrap').innerHTML = '';

  try {
    if (mode === 'worldcup') {
      await loadWorldCupMode(td);
    } else {
      await loadPremierLeagueMode(td);
    }
    renderSummary();
    renderCards();
    scheduleRefresh();
  } catch(err) {
    document.getElementById('grid').innerHTML = `<div class="errbanner" style="grid-column:1/-1"><strong>API Error:</strong> ${err.message}</div>`;
    console.error(err);
  }
}

async function loadWorldCupMode(td) {
  let wcSquads = {};
  try {
    const sq = await get('/worldcup/squads/');
    const list = sq.results || sq;
    (Array.isArray(list) ? list : []).forEach(e => {
      const key = (e.player_name || e.name || '').toLowerCase();
      if (key) wcSquads[key] = { nation: e.national_team || e.team_name || '', status: e.status || '' };
    });
  } catch(e) {}

  const [todayEvs, liveEvs] = await Promise.allSettled([
    get(`/events/?date_from=${td}&date_to=${td}&limit=200`),
    get('/events/live/')
  ]);

  const todayList = todayEvs.status==='fulfilled' ? (todayEvs.value.results || []) : [];
  const liveList  = liveEvs.status==='fulfilled'  ? (liveEvs.value.events || liveEvs.value.results || []) : [];
  const seen = new Set();
  const allEvs = [...liveList, ...todayList].filter(e => { if (seen.has(e.id)) return false; seen.add(e.id); return true; });

  allCards = await buildPlayerCards(ARSENAL_SQUAD, allEvs, (p, ev) => {
    const nl = p.nation.toLowerCase();
    return (ev.home_team||'').toLowerCase().includes(nl) || (ev.away_team||'').toLowerCase().includes(nl);
  }, wcSquads);

  renderMatchBanner(allEvs.find(e => allCards.some(c => c.eventInfo?.id === e.id && (e.status==='inprogress'||e.status==='finished'))));
}

async function loadPremierLeagueMode(td) {
  const [todayEvs, liveEvs] = await Promise.allSettled([
    get(`/events/?date_from=${td}&date_to=${td}&team_id=${ARSENAL_TEAM_ID}&limit=20`),
    get(`/events/live/?team_id=${ARSENAL_TEAM_ID}`)
  ]);

  const todayList = todayEvs.status==='fulfilled' ? (todayEvs.value.results || []) : [];
  const liveList  = liveEvs.status==='fulfilled'  ? (liveEvs.value.events || liveEvs.value.results || []) : [];
  const seen = new Set();
  const allEvs = [...liveList, ...todayList].filter(e => { if (seen.has(e.id)) return false; seen.add(e.id); return true; });

  const arsenalMatch = allEvs.find(e =>
    String(e.home_team_id)===String(ARSENAL_TEAM_ID) || String(e.away_team_id)===String(ARSENAL_TEAM_ID) ||
    (e.home_team||'').toLowerCase().includes('arsenal') || (e.away_team||'').toLowerCase().includes('arsenal')
  );

  if (!arsenalMatch) {
    document.getElementById('infoBannerWrap').innerHTML = `<div class="infobanner">Arsenal have no Premier League match today. Showing squad availability status — next fixture data will appear on matchday.</div>`;
    allCards = ARSENAL_SQUAD.map(p => ({...p, status:'nomatch', goals:0, assists:0, mins:0, shots:0, passes:0, rating:null, incidents:[], eventInfo:null}));
    return;
  }

  renderMatchBanner(arsenalMatch);

  allCards = await buildPlayerCards(ARSENAL_SQUAD, allEvs, (p, ev) =>
    String(ev.home_team_id)===String(ARSENAL_TEAM_ID) || String(ev.away_team_id)===String(ARSENAL_TEAM_ID) ||
    (ev.home_team||'').toLowerCase().includes('arsenal') || (ev.away_team||'').toLowerCase().includes('arsenal'),
    {}
  );
}

const lineupCache = {};
const incidentCache = {};

async function getLineup(id) {
  if (lineupCache[id]) return lineupCache[id];
  try { const d = await get(`/events/${id}/lineups/`); lineupCache[id] = d; return d; } catch(e) { return null; }
}

async function getIncidents(id) {
  if (incidentCache[id]) return incidentCache[id];
  try { const d = await get(`/events/${id}/incidents/`); const inc = d.incidents || []; incidentCache[id] = inc; return inc; } catch(e) { return []; }
}

async function buildPlayerCards(squad, events, matchFn, wcSquads) {
  return Promise.all(squad.map(async p => {
    const matchEv = events.find(ev => matchFn(p, ev));
    let status = 'nomatch', goals = 0, assists = 0, mins = 0, shots = 0, passes = 0, rating = null, incidents = [], eventInfo = null;

    const wcKey = Object.keys(wcSquads).find(k => k.includes(p.short.toLowerCase()) || p.name.toLowerCase().split(' ').some(w => w.length>3 && k.includes(w)));
    if (wcKey && (wcSquads[wcKey].status||'').toLowerCase().includes('injur')) {
      return {...p, status:'injured', goals, assists, mins, shots, passes, rating, incidents, eventInfo};
    }

    if (matchEv) {
      eventInfo = matchEv;
      const [lineup, incs] = await Promise.all([getLineup(matchEv.id), getIncidents(matchEv.id)]);
      incidents = incs;

      const starters = [...(lineup?.home_lineup||lineup?.home?.lineup||[]), ...(lineup?.away_lineup||lineup?.away?.lineup||[])];
      const bench = [...(lineup?.home_subs||lineup?.home?.subs||lineup?.home?.substitutes||[]), ...(lineup?.away_subs||lineup?.away?.subs||lineup?.away?.substitutes||[])];

      const isStarter = starters.some(pl => nameMatch(p, pl.name||pl.player_name||pl.player||''));
      const isBench   = bench.some(pl => nameMatch(p, pl.name||pl.player_name||pl.player||''));

      const playerIncs = incs.filter(i => nameMatch(p, i.player||i.player_name||i.player_in||''));
      goals   = playerIncs.filter(i => i.type==='goal').length;
      assists = playerIncs.filter(i => i.type==='assist'||(i.assist_player&&nameMatch(p,i.assist_player))).length;

      const subOut = incs.find(i => i.type==='substitution' && nameMatch(p, i.player_out||''));
      const subIn  = incs.find(i => i.type==='substitution' && nameMatch(p, i.player_in||''));

      if (matchEv.status==='inprogress'||matchEv.status==='finished') {
        if (isStarter) {
          mins = subOut ? subOut.minute : (matchEv.current_minute || 90);
          status = 'playing';
        } else if (subIn) {
          mins = (matchEv.current_minute||90) - subIn.minute;
          status = 'playing';
        } else if (isBench) {
          status = 'benched';
        } else {
          status = matchEv.status==='inprogress' ? 'playing' : 'nomatch';
          if (matchEv.status==='inprogress') mins = matchEv.current_minute || 0;
        }
      } else if (matchEv.status==='notstarted') {
        status = isStarter ? 'playing' : isBench ? 'benched' : 'nomatch';
      }
    }

    return {...p, status, goals, assists, mins, shots, passes, rating, incidents, eventInfo};
  }));
}

function renderMatchBanner(ev) {
  if (!ev) return;
  const isLive = ev.status==='inprogress';
  const hasScore = ev.status==='inprogress'||ev.status==='finished';
  document.getElementById('matchBannerWrap').innerHTML = `
    <div class="matchbanner">
      <div class="mbteams">${ev.home_team||''} <span class="mbvs">vs</span> ${ev.away_team||''}</div>
      <div class="mbmeta">
        <div>
          <div class="mbcomp">${ev.league_name||'Match'} ${isLive?`· ${ev.current_minute||0}'`:''}</div>
          <div class="mbtime">${ev.status==='notstarted' ? new Date(ev.event_date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) + ' KO' : ev.status}</div>
        </div>
        ${hasScore ? `<div class="mbscore">${ev.home_score} – ${ev.away_score}</div>` : ''}
      </div>
    </div>`;
}

function renderSummary() {
  document.getElementById('sb-playing').textContent = allCards.filter(c=>c.status==='playing').length;
  document.getElementById('sb-benched').textContent = allCards.filter(c=>c.status==='benched').length;
  document.getElementById('sb-injured').textContent = allCards.filter(c=>c.status==='injured').length;
  document.getElementById('sb-goals').textContent   = allCards.reduce((a,c)=>a+c.goals,0);
}

function renderCards() {
  const grid = document.getElementById('grid');
  const filtered = currentFilter==='all' ? allCards : allCards.filter(c=>c.status===currentFilter);
  document.getElementById('cardCount').textContent = `${filtered.length} player${filtered.length!==1?'s':''}`;
  if (!filtered.length) { grid.innerHTML = '<div class="nocards">No players matching this filter</div>'; return; }

  grid.innerHTML = '';
  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = `card ${p.status}${p.gold?' gold':''}`;
    card.onclick = () => openModal(p);
    const rdisp = p.rating ? p.rating.toFixed(1) : '—';
    const mdisp = p.mins > 0 ? `${Math.round(p.mins)}'` : '—';
    const statusLabel = {playing:'Playing',benched:'Benched',injured:'Injured',nomatch:'No Match'}[p.status];
    card.innerHTML = `
      <div class="cinner">
        <div class="cbg"></div><div class="cstripe"></div><div class="cholo"></div>
        <div class="ccontent">
          <div class="cnum">#${p.num}</div>
         <div class="csil">
  <div class="pflare"></div>

  ${
    PLAYER_IMAGES[p.short]
      ? `<img class="pimg" src="${PLAYER_IMAGES[p.short]}" alt="${p.name}">`
      : `
        <div class="sring">
          <svg viewBox="0 0 44 44" fill="none">
            <circle cx="22" cy="14" r="7" fill="rgba(255,255,255,.22)"/>
            <path d="M8 42C8 30 36 30 36 42" fill="rgba(255,255,255,.18)"/>
          </svg>
        </div>
      `
  }
            <div class="crating">${rdisp}</div>
            <div class="cratinglbl">Rating</div>
            <div class="cpos">${p.pos}</div>
          </div>
          <div class="cinfo">
            <div class="cname">${p.short}</div>
            <div class="cnation">${mode==='worldcup' ? p.nation : 'Arsenal FC'}</div>
            <span class="cspill ${p.status}">${statusLabel}</span>
            <div class="cstatrow">
              <div class="cstat"><div class="cstatv">${p.goals}</div><div class="cstatk">Gls</div></div>
              <div class="cstat"><div class="cstatv">${p.assists}</div><div class="cstatk">Ast</div></div>
              <div class="cstat"><div class="cstatv">${mdisp}</div><div class="cstatk">Mins</div></div>
            </div>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(p) {
  document.getElementById('mname').textContent = p.name;
  document.getElementById('mnation').textContent = `${mode==='worldcup'?p.nation:'Arsenal FC'} · ${p.pos}`;
  document.getElementById('mstripe').style.background = STATUS_COLOR[p.status]||'#555';
  const ev = p.eventInfo;
  document.getElementById('mcomp').textContent = ev ? (ev.league_name||'Match') : 'No match today';
  document.getElementById('mteams').textContent = ev ? `${ev.home_team} vs ${ev.away_team}` : '—';
  document.getElementById('mscore').textContent = ev&&(ev.status==='inprogress'||ev.status==='finished') ? `${ev.home_score} – ${ev.away_score}${ev.current_minute?` · ${ev.current_minute}'`:''}` : ev?'Not started':'—';
  document.getElementById('ms-mins').textContent  = p.mins > 0 ? `${Math.round(p.mins)}'` : '—';
  document.getElementById('ms-goals').textContent   = p.goals;
  document.getElementById('ms-assists').textContent = p.assists;
  document.getElementById('ms-shots').textContent   = p.shots||'—';
  document.getElementById('ms-passes').textContent  = p.passes||'—';
  document.getElementById('ms-rating').textContent  = p.rating ? p.rating.toFixed(1) : '—';

  const playerIncs = (p.incidents||[]).filter(i => nameMatch(p, i.player||i.player_name||i.player_in||''));
  const incBox = document.getElementById('mincidents');
  if (playerIncs.length) {
    incBox.innerHTML = playerIncs.map(i => {
      const icon = i.type==='goal'?'⚽':i.type==='card'?(i.card_type==='yellow'?'🟨':'🟥'):i.type==='substitution'?'🔄':'📋';
      const desc = i.type==='goal'?'Goal':i.type==='card'?`${i.card_type} card`:i.type==='substitution'?`Sub ${i.player_in?'on':'off'}`:i.type;
      return `<div class="minc"><span class="mincmin">${i.minute}'</span><span>${icon}</span><span>${desc}</span></div>`;
    }).join('');
  } else {
    incBox.innerHTML = `<div style="font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;color:rgba(255,255,255,.3);padding:8px 0">No incidents recorded yet</div>`;
  }
  document.getElementById('modalWrap').classList.add('open');
}

function closeModal(e) { if (e.target===document.getElementById('modalWrap')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalWrap').classList.remove('open'); }

function scheduleRefresh() {
  clearInterval(refreshTimer);
  const hasLive = allCards.some(c => c.eventInfo?.status==='inprogress');
  if (hasLive) refreshTimer = setInterval(loadData, 30000);
}

loadData();
</script>
