<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Tweet Churner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00C46A;
    --green-dim: #00a356;
    --dark: #0a0e0f;
    --card: #111518;
    --card2: #181d20;
    --border: rgba(255,255,255,0.07);
    --text: #e8ece8;
    --muted: #7a8a80;
    --accent: #00C46A;
    --red: #ff4757;
    --amber: #ffb000;
    --blue: #3fa9f5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    letter-spacing: 0.01em;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(0,196,106,0.04);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 18px;
    color: var(--green);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--text); }

  .badge {
    background: var(--green);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .badge.live {
    background: var(--red);
    color: #fff;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.65; }
  }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 65px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .api-input-wrap {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .api-input-wrap label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"], input[type="password"] {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    flex: 1;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--green); }

  button {
    background: var(--green);
    color: #000;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  button:hover { background: var(--green-dim); }
  button:active { transform: scale(0.97); }

  button.secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  button.secondary:hover { border-color: var(--green); color: var(--green); background: var(--card2); }

  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .matches-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .matches-list::-webkit-scrollbar { width: 4px; }
  .matches-list::-webkit-scrollbar-track { background: transparent; }
  .matches-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .match-card {
    padding: 12px 20px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
  }

  .match-card:hover { background: var(--card2); }

  .match-card.active {
    background: rgba(0,196,106,0.06);
    border-left-color: var(--green);
  }

  .match-teams {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .match-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
  }

  .match-score {
    color: var(--green);
    font-weight: 700;
  }

  .match-min {
    color: var(--muted);
  }

  .match-league {
    color: var(--muted);
    font-size: 10px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }

  .content-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .match-detail {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
    overflow-y: auto;
    max-height: 55vh;
  }

  .score-display {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -0.02em;
  }

  .teams-display {
    flex: 1;
  }

  .teams-display .home { font-size: 22px; font-weight: 800; }
  .teams-display .vs { font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .teams-display .away { font-size: 22px; font-weight: 800; }

  .stats-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
  }

  .stat-pill span { color: var(--green); }

  .tweet-workspace {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tweet-toolbar {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .toolbar-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }

  .tone-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: lowercase;
  }

  .tone-btn:hover, .tone-btn.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,196,106,0.08);
  }

  .tweets-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .tweets-container::-webkit-scrollbar { width: 4px; }
  .tweets-container::-webkit-scrollbar-track { background: transparent; }
  .tweets-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .tweet-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    transition: border-color 0.2s;
  }

  .tweet-card:hover { border-color: rgba(255,255,255,0.14); }

  .tweet-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .tweet-type {
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(0,196,106,0.12);
    color: var(--green);
    border: 1px solid rgba(0,196,106,0.25);
  }

  .tweet-type.goal { background: rgba(255,71,87,0.12); color: var(--red); border-color: rgba(255,71,87,0.25); }
  .tweet-type.stat { background: rgba(63,169,245,0.12); color: var(--blue); border-color: rgba(63,169,245,0.25); }
  .tweet-type.player { background: rgba(255,176,0,0.12); color: var(--amber); border-color: rgba(255,176,0,0.25); }

  .tweet-body {
    font-size: 16px;
    font-weight: 400;
    line-height: 1.5;
    color: var(--text);
    margin-bottom: 12px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.02em;
  }

  .tweet-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .char-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .char-count.warn { color: var(--amber); }
  .char-count.over { color: var(--red); }

  .tweet-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    padding: 0;
  }

  .icon-btn:hover { border-color: var(--green); color: var(--green); background: rgba(0,196,106,0.08); }
  .icon-btn:active { transform: scale(0.93); }

  .generate-bar {
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.2);
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    padding: 40px;
  }

  .empty-icon { font-size: 48px; opacity: 0.3; }

  .empty-state p {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    text-align: center;
    line-height: 1.6;
  }

  .loading-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: bounce 0.9s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .copied-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--green);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 6px;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 999;
  }

  .copied-toast.show { transform: translateX(-50%) translateY(0); }

  .incidents-strip {
    padding: 8px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    overflow-x: auto;
    align-items: center;
    min-height: 38px;
  }

  .incident-chip {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .incident-chip.goal { border-color: rgba(255,71,87,0.35); color: var(--red); background: rgba(255,71,87,0.08); }
  .incident-chip.card { border-color: rgba(255,176,0,0.35); color: var(--amber); background: rgba(255,176,0,0.08); }

  .no-matches {
    padding: 30px 20px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  .section-label {
    padding: 8px 20px 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }

  .match-card.recent { opacity: 0.85; }
  .match-card.recent:hover { opacity: 1; }

  .refresh-btn {
    font-size: 11px;
    padding: 5px 12px;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
  }

  .refresh-btn:hover { border-color: var(--green); color: var(--green); background: none; }

  textarea {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    flex: 1;
    outline: none;
    resize: none;
    transition: border-color 0.2s;
    line-height: 1.4;
  }

  textarea:focus { border-color: var(--green); }

  .mode-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
  }

  .mode-tab {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 16px 8px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 0;
    margin-bottom: -1px;
  }

  .mode-tab:hover { color: var(--text); background: none; }
  .mode-tab.active { color: var(--green); border-bottom-color: var(--green); }

  .player-panel {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  .player-panel.visible { display: flex; }

  .player-picker {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .player-select {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 6px;
    flex: 1;
    outline: none;
    min-width: 160px;
    cursor: pointer;
  }

  .player-select:focus { border-color: var(--green); }

  .player-stats-grid {
    padding: 16px 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    border-bottom: 1px solid var(--border);
    overflow-y: auto;
    max-height: 220px;
  }

  .player-stat-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .player-stat-card .psc-val {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
  }

  .player-stat-card .psc-val.highlight { color: var(--amber); }
  .player-stat-card .psc-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'Space Mono', monospace;
  }

  .player-info-bar {
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .player-name-display {
    font-size: 20px;
    font-weight: 800;
  }

  .player-badge {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  .player-badge.pos-g { border-color: rgba(255,71,87,0.4); color: var(--red); }
  .player-badge.pos-d { border-color: rgba(63,169,245,0.4); color: var(--blue); }
  .player-badge.pos-m { border-color: rgba(0,196,106,0.4); color: var(--green); }
  .player-badge.pos-f { border-color: rgba(255,176,0,0.4); color: var(--amber); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ tweet<span>churn</span></div>
  <div class="badge live" id="liveBadge" style="display:none">● live</div>
  <div class="badge">football</div>
  <div style="flex:1"></div>
  <div id="matchCount" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)"></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="api-input-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between"><label>BSD API Key</label><button onclick="clearKeys()" style="background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;padding:0;text-transform:uppercase;letter-spacing:0.06em;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">✕ clear keys</button></div>
      <div class="input-row">
        <input type="password" id="bsdKey" placeholder="your-bzzoiro-token" />
      </div>
      <label>Groq API Key <a href="https://console.groq.com/keys" target="_blank" style="color:var(--green);font-size:10px;text-decoration:none">→ get free key</a></label>
      <div class="input-row">
        <input type="password" id="anthropicKey" placeholder="gsk_..." />
      </div>
      <label>Model</label>
      <div class="input-row">
        <select id="geminiModel" style="background:var(--card2);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:8px 10px;border-radius:6px;flex:1;outline:none;">
          <option value="llama-3.3-70b-versatile">llama-3.3-70b (recommended)</option>
          <option value="llama3-8b-8192">llama3-8b (fastest)</option>
          <option value="mixtral-8x7b-32768">mixtral-8x7b</option>
          <option value="gemma2-9b-it">gemma2-9b</option>
        </select>
      </div>
      <div class="input-row" style="margin-top:4px">
        <button onclick="fetchLiveMatches()" id="fetchBtn">Load Matches</button>
        <button class="secondary refresh-btn" onclick="fetchLiveMatches()" title="Refresh">↻</button>
      </div>
    </div>

    <div class="sidebar-header">
      <span class="sidebar-title">Live Matches</span>
      <span id="liveCount" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)"></span>
    </div>

    <div class="matches-list" id="matchesList">
      <div class="no-matches">Enter your BSD API key<br>and click Load Live Matches</div>
    </div>
  </div>

  <div class="content-area">
    <div id="matchDetail" style="display:none">
      <div class="match-detail" id="matchHeader"></div>
      <div class="incidents-strip" id="incidentsStrip"></div>
    </div>

    <div class="tweet-workspace">

      <!-- Mode tabs — only show after match selected -->
      <div class="mode-tabs" id="modeTabs" style="display:none">
        <button class="mode-tab active" id="tabMatch" onclick="switchMode('match')">⚽ Match</button>
        <button class="mode-tab" id="tabPlayer" onclick="switchMode('player')">👤 Player</button>
      </div>

      <!-- MATCH MODE -->
      <div id="matchMode" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="tweet-toolbar" id="tweetToolbar" style="display:none">
          <span class="toolbar-label">Tone:</span>
          <button class="tone-btn active" data-tone="hype" onclick="setTone(this)">🔥 hype</button>
          <button class="tone-btn" data-tone="analytical" onclick="setTone(this)">📊 analytical</button>
          <button class="tone-btn" data-tone="funny" onclick="setTone(this)">😂 funny</button>
          <button class="tone-btn" data-tone="pundit" onclick="setTone(this)">🎙️ pundit</button>
          <div style="flex:1"></div>
          <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)" id="tweetGenCount"></span>
        </div>

        <div class="tweets-container" id="tweetsContainer">
          <div class="empty-state">
            <div class="empty-icon">⚽</div>
            <p>Select a live match from the sidebar<br>then generate tweets with AI</p>
          </div>
        </div>

        <div class="generate-bar" id="generateBar" style="display:none">
          <textarea id="customContext" rows="1" placeholder="Add context (optional): e.g. 'focus on the goalkeeper's performance'" style="height:38px; padding:8px 14px; font-size:14px;"></textarea>
          <button onclick="generateTweets()" id="genBtn">✦ Generate Tweets</button>
        </div>
      </div>

      <!-- PLAYER MODE -->
      <div class="player-panel" id="playerMode">
        <div class="player-picker">
          <select class="player-select" id="playerSelect" onchange="loadPlayerStats()">
            <option value="">— select a player —</option>
          </select>
          <span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)" id="playerLoadStatus"></span>
        </div>
        <div id="playerInfoBar" class="player-info-bar" style="display:none"></div>
        <div id="playerStatsGrid" class="player-stats-grid" style="display:none"></div>
        <div class="tweets-container" id="playerTweetsContainer">
          <div class="empty-state">
            <div class="empty-icon">👤</div>
            <p>Select a player above<br>to generate player-focused tweets</p>
          </div>
        </div>
        <div class="generate-bar">
          <textarea id="playerCustomContext" rows="1" placeholder="Add context (optional): e.g. 'he just got injured'" style="height:38px; padding:8px 14px; font-size:14px;"></textarea>
          <button onclick="generatePlayerTweets()" id="playerGenBtn">✦ Generate Tweets</button>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="copied-toast" id="toast">Copied!</div>

<script>
let selectedMatch = null;
let currentTone = 'hype';
let generatedCount = 0;

// Load saved keys on startup
window.addEventListener('DOMContentLoaded', () => {
  const savedBsd = localStorage.getItem('bsd_api_key');
  const savedGroq = localStorage.getItem('groq_api_key');
  const savedModel = localStorage.getItem('groq_model');
  if (savedBsd) document.getElementById('bsdKey').value = savedBsd;
  if (savedGroq) document.getElementById('anthropicKey').value = savedGroq;
  if (savedModel) document.getElementById('geminiModel').value = savedModel;
});

function saveKeys() {
  localStorage.setItem('bsd_api_key', document.getElementById('bsdKey').value.trim());
  localStorage.setItem('groq_api_key', document.getElementById('anthropicKey').value.trim());
  localStorage.setItem('groq_model', document.getElementById('geminiModel').value);
}

function clearKeys() {
  localStorage.removeItem('bsd_api_key');
  localStorage.removeItem('groq_api_key');
  localStorage.removeItem('groq_model');
  document.getElementById('bsdKey').value = '';
  document.getElementById('anthropicKey').value = '';
  showToast('Keys cleared');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function setTone(btn) {
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTone = btn.dataset.tone;
}

async function fetchLiveMatches() {
  const apiKey = document.getElementById('bsdKey').value.trim();
  if (!apiKey) { alert('Please enter your BSD API key'); return; }
  saveKeys();

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = 'Loading...';
  document.getElementById('matchesList').innerHTML = '<div class="no-matches">Fetching matches...</div>';

  try {
    // Fetch live matches and recent finished matches in parallel
    const now = new Date();
    const yesterday = new Date(now - 24 * 60 * 60 * 1000);
    const dateFrom = yesterday.toISOString().split('T')[0];
    const dateTo = now.toISOString().split('T')[0];

    const [liveRes, recentRes] = await Promise.all([
      fetch('https://sports.bzzoiro.com/api/live/?full=true', {
        headers: { 'Authorization': `Token ${apiKey}` }
      }),
      fetch(`https://sports.bzzoiro.com/api/events/?date_from=${dateFrom}&date_to=${dateTo}&status=finished&limit=50`, {
        headers: { 'Authorization': `Token ${apiKey}` }
      })
    ]);

    if (!liveRes.ok) throw new Error(`API error ${liveRes.status}`);
    const liveData = await liveRes.json();
    const liveMatches = liveData.results || [];

    let recentMatches = [];
    if (recentRes.ok) {
      const recentData = await recentRes.json();
      recentMatches = (recentData.results || []).filter(m => m.status === 'finished');
    }

    renderMatches(liveMatches, recentMatches);

    const total = liveMatches.length + recentMatches.length;
    document.getElementById('liveBadge').style.display = liveMatches.length ? 'flex' : 'none';
    document.getElementById('liveCount').textContent = liveMatches.length ? `${liveMatches.length} live` : '';
    document.getElementById('matchCount').textContent = `${liveMatches.length} live · ${recentMatches.length} recent`;

  } catch(e) {
    document.getElementById('matchesList').innerHTML = `<div class="no-matches">Error: ${e.message}<br><br>Check your API key</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Load Matches';
  }
}

function renderMatches(liveMatches, recentMatches) {
  const list = document.getElementById('matchesList');
  const allMatches = [...liveMatches, ...recentMatches];

  if (!allMatches.length) {
    list.innerHTML = '<div class="no-matches">No matches found in the last 24 hours.</div>';
    return;
  }

  window._liveMatches = allMatches;

  let html = '';

  if (liveMatches.length) {
    html += `<div class="section-label">🔴 Live Now</div>`;
    html += liveMatches.map((m, i) => `
      <div class="match-card" onclick="selectMatch(${i})" id="mc${i}">
        <div class="match-teams">${m.home_team} vs ${m.away_team}</div>
        <div class="match-meta">
          <div class="status-dot"></div>
          <span class="match-score">${m.home_score ?? 0}–${m.away_score ?? 0}</span>
          <span class="match-min">${m.current_minute ?? '--'}'</span>
          <span class="match-league">${m.league?.name || ''}</span>
        </div>
        ${(() => { const gs = (m.incidents||[]).filter(i=>i.type==='goal'); return gs.length ? `<div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:4px;line-height:1.7">${gs.map(g=>`⚽ ${g.player_name||'?'} ${g.minute}'`).join('  ')}</div>` : ''; })()}
      </div>
    `).join('');
  }

  if (recentMatches.length) {
    html += `<div class="section-label" style="margin-top:${liveMatches.length ? '8px' : '0'}">✓ Last 24hrs</div>`;
    html += recentMatches.map((m, i) => {
      const idx = liveMatches.length + i;
      const kickoff = new Date(m.event_date);
      const timeStr = kickoff.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      return `
        <div class="match-card recent" onclick="selectMatch(${idx})" id="mc${idx}">
          <div class="match-teams">${m.home_team} vs ${m.away_team}</div>
          <div class="match-meta">
            <span class="match-score" style="color:var(--text)">${m.home_score ?? 0}–${m.away_score ?? 0}</span>
            <span class="match-min">FT</span>
            <span class="match-league">${m.league?.name || ''}</span>
            <span style="color:var(--muted);font-size:10px;margin-left:auto">${timeStr}</span>
          </div>
          ${(() => { const gs = (m.incidents||[]).filter(i=>i.type==='goal'); return gs.length ? `<div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:4px;line-height:1.7">${gs.map(g=>`⚽ ${g.player_name||'?'} ${g.minute}'`).join('  ')}</div>` : ''; })()}
        </div>
      `;
    }).join('');
  }

  list.innerHTML = html;
}

function selectMatch(idx) {
  selectedMatch = window._liveMatches[idx];
  selectedMatch._isLive = selectedMatch.status !== 'finished';

  document.querySelectorAll('.match-card').forEach(c => c.classList.remove('active'));
  document.getElementById('mc' + idx)?.classList.add('active');

  renderMatchDetail(selectedMatch);
  document.getElementById('tweetsContainer').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">✦</div>
      <p>Match selected!<br>Click "Generate Tweets" to create live content</p>
    </div>`;

  document.getElementById('tweetToolbar').style.display = 'flex';
  document.getElementById('generateBar').style.display = 'flex';
  document.getElementById('modeTabs').style.display = 'flex';
  // Reset to match mode
  switchMode('match');
  generatedCount = 0;
  document.getElementById('tweetGenCount').textContent = '';
}

function renderMatchDetail(m) {
  document.getElementById('matchDetail').style.display = 'block';

  const ls = m.live_stats || {};
  const hStats = ls.home || {};
  const aStats = ls.away || {};

  // Build goalscorer lists from incidents
  const goals = (m.incidents || []).filter(i => i.type === 'goal');
  const homeGoals = goals.filter(i => i.is_home);
  const awayGoals = goals.filter(i => !i.is_home);

  const goalsHtml = (list) => list.length
    ? list.map(g => `<div style="font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;line-height:1.6">
        ⚽ <span style="color:var(--text)">${g.player_name || 'Unknown'}</span> ${g.minute}'${g.is_own_goal ? ' <span style="color:var(--red)">(OG)</span>' : ''}${g.is_penalty ? ' <span style="color:var(--amber)">(P)</span>' : ''}
      </div>`).join('')
    : '';

  document.getElementById('matchHeader').innerHTML = `
    <div class="teams-display">
      <div class="home">${m.home_team}</div>
      ${goalsHtml(homeGoals)}
      <div style="margin-top:8px" class="vs">${m.period || ''} · ${m.current_minute ?? '--'}'</div>
      <div class="away">${m.away_team}</div>
      ${goalsHtml(awayGoals)}
    </div>
    <div class="score-display">${m.home_score ?? 0}–${m.away_score ?? 0}</div>
    <div id="statsGrid" style="width:100%;margin-top:12px"></div>
  `;

  renderStatsGrid(m, hStats, aStats);

  const incidents = (m.incidents || []).slice(-6).reverse();
  const strip = document.getElementById('incidentsStrip');
  if (!incidents.length) {
    strip.innerHTML = '<span style="font-family:\'Space Mono\',monospace;font-size:11px;color:var(--muted)">No incidents yet</span>';
  } else {
    strip.innerHTML = incidents.map(inc => {
      const isGoal = inc.type === 'goal';
      const isCard = inc.type === 'card';
      const icon = isGoal ? '⚽' : isCard ? (inc.card_type === 'red' ? '🟥' : '🟨') : '↔';
      const label = isGoal ? `${icon} ${inc.minute}' ${inc.player_name || ''} (${inc.is_home ? m.home_team.split(' ')[0] : m.away_team.split(' ')[0]})`
                  : isCard ? `${icon} ${inc.minute}' ${inc.player_name || ''}`
                  : `↔ ${inc.minute}' ${inc.player_in || ''} ↑`;
      return `<div class="incident-chip ${isGoal ? 'goal' : isCard ? 'card' : ''}">${label}</div>`;
    }).join('');
  }
}

function renderStatsGrid(m, hStats, aStats) {
  const grid = document.getElementById('statsGrid');
  if (!grid) return;

  const statRows = [
    { label: 'Possession', h: hStats.ball_possession != null ? hStats.ball_possession + '%' : null, a: aStats.ball_possession != null ? aStats.ball_possession + '%' : null, bar: true, hVal: hStats.ball_possession, aVal: aStats.ball_possession },
    { label: 'xG', h: m.home_xg_live != null ? (m.home_xg_live||0).toFixed(2) : null, a: m.away_xg_live != null ? (m.away_xg_live||0).toFixed(2) : null, bar: true, hVal: m.home_xg_live||0, aVal: m.away_xg_live||0 },
    { label: 'Shots', h: hStats.total_shots, a: aStats.total_shots, bar: true, hVal: hStats.total_shots, aVal: aStats.total_shots },
    { label: 'On Target', h: hStats.shots_on_target, a: aStats.shots_on_target, bar: true, hVal: hStats.shots_on_target, aVal: aStats.shots_on_target },
    { label: 'Corners', h: hStats.corner_kicks, a: aStats.corner_kicks, bar: true, hVal: hStats.corner_kicks, aVal: aStats.corner_kicks },
    { label: 'Fouls', h: hStats.fouls, a: aStats.fouls, bar: true, hVal: hStats.fouls, aVal: aStats.fouls },
    { label: 'Yellow Cards', h: hStats.yellow_cards, a: aStats.yellow_cards, bar: false },
    { label: 'Red Cards', h: hStats.red_cards, a: aStats.red_cards, bar: false },
    { label: 'Offsides', h: hStats.offsides, a: aStats.offsides, bar: false },
    { label: 'Passes', h: hStats.total_passes != null ? hStats.total_passes : null, a: aStats.total_passes != null ? aStats.total_passes : null, bar: true, hVal: hStats.total_passes, aVal: aStats.total_passes },
    { label: 'Pass Acc.', h: hStats.accurate_passes != null && hStats.total_passes ? Math.round(hStats.accurate_passes/hStats.total_passes*100) + '%' : null, a: aStats.accurate_passes != null && aStats.total_passes ? Math.round(aStats.accurate_passes/aStats.total_passes*100) + '%' : null, bar: true, hVal: hStats.total_passes ? Math.round(hStats.accurate_passes/hStats.total_passes*100) : 0, aVal: aStats.total_passes ? Math.round(aStats.accurate_passes/aStats.total_passes*100) : 0 },
    { label: 'Key Passes', h: hStats.key_passes, a: aStats.key_passes, bar: true, hVal: hStats.key_passes, aVal: aStats.key_passes },
    { label: 'Crosses', h: hStats.total_crosses != null ? hStats.total_crosses : null, a: aStats.total_crosses != null ? aStats.total_crosses : null, bar: false },
    { label: 'Tackles Won', h: hStats.won_tackles != null ? hStats.won_tackles : null, a: aStats.won_tackles != null ? aStats.won_tackles : null, bar: false },
    { label: 'Interceptions', h: hStats.interceptions, a: aStats.interceptions, bar: false },
    { label: 'Ball Recovery', h: hStats.ball_recovery, a: aStats.ball_recovery, bar: false },
    { label: 'Aerials Won', h: hStats.aerial_won, a: aStats.aerial_won, bar: false },
    { label: 'Duels Won', h: hStats.duel_won, a: aStats.duel_won, bar: false },
    { label: 'Long Balls', h: hStats.total_long_balls, a: aStats.total_long_balls, bar: false },
    { label: 'Dispossessed', h: hStats.dispossessed, a: aStats.dispossessed, bar: false },
    { label: 'xA', h: hStats.expected_assists != null ? (hStats.expected_assists||0).toFixed(2) : null, a: aStats.expected_assists != null ? (aStats.expected_assists||0).toFixed(2) : null, bar: false },
  ].filter(r => r.h != null && r.h !== undefined && r.h !== '');

  if (!statRows.length) { grid.innerHTML = ''; return; }

  grid.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:0;width:100%;font-family:'Space Mono',monospace;font-size:11px;">
      ${statRows.map(r => {
        const total = (parseFloat(r.hVal)||0) + (parseFloat(r.aVal)||0);
        const hPct = total > 0 ? Math.round((parseFloat(r.hVal)||0) / total * 100) : 50;
        const aPct = 100 - hPct;
        const hWin = parseFloat(r.hVal) > parseFloat(r.aVal);
        const aWin = parseFloat(r.aVal) > parseFloat(r.hVal);
        return `
          <div style="text-align:right;padding:5px 10px 5px 0;color:${hWin ? 'var(--text)' : 'var(--muted)'};font-weight:${hWin ? '700' : '400'}">${r.h}</div>
          <div style="text-align:center;padding:5px 8px;color:var(--muted);font-size:10px;white-space:nowrap;letter-spacing:0.05em">${r.label}</div>
          <div style="text-align:left;padding:5px 0 5px 10px;color:${aWin ? 'var(--text)' : 'var(--muted)'};font-weight:${aWin ? '700' : '400'}">${r.a}</div>
          ${r.bar && total > 0 ? `
          <div style="grid-column:1/-1;padding:0 0 4px;display:flex;height:3px;gap:2px">
            <div style="flex:${hPct};background:var(--green);border-radius:2px 0 0 2px;opacity:${hWin?'1':'0.35'}"></div>
            <div style="flex:${aPct};background:var(--blue);border-radius:0 2px 2px 0;opacity:${aWin?'1':'0.35'}"></div>
          </div>` : '<div style="grid-column:1/-1;height:1px;background:var(--border);margin:0 0 2px"></div>'}
        `;
      }).join('')}
    </div>
  `;
}

async function generateTweets() {
  if (!selectedMatch) return;
  const anthropicKey = document.getElementById('anthropicKey').value.trim();
  if (!anthropicKey) { alert('Please enter your Groq API key'); return; }
  saveKeys();

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  const m = selectedMatch;
  const ls = m.live_stats || {};
  const hStats = ls.home || {};
  const aStats = ls.away || {};
  const incidents = m.incidents || [];
  const customCtx = document.getElementById('customContext').value.trim();

  const toneGuide = {
    hype: 'write it like a human. ultra hype, passionate fan energy — use CAPS for key moments, multiple emojis, exclamation marks, dramatic phrasing. Write like someone screaming at their TV. Pack in the drama, the stakes, the emotion. Reference specific stats and players to make it feel real.',
    analytical: 'write it like a human. sharp tactical analyst — dig into the xG numbers, possession patterns, shot locations, pressing stats. Explain WHY a team is dominating or struggling. Use specific numbers. Write like a football analytics journalist breaking down what the data really means right now.',
    funny: 'write it like a human. hilarious football banter — sharp wit, unexpected comparisons, relatable fan suffering or joy, absurdist observations about what is happening. Reference the specific match stats in a funny way. Think viral football Twitter humour. Make it genuinely laugh-out-loud.',
    pundit: 'write it like a human. authoritative TV pundit — make a bold, specific claim about the match narrative, back it with stats, add tactical insight. Sounds like Gary Neville or Jamie Carragher mid-match. Confident, opinionated, detailed.'
  };

  const matchData = `
Match: ${m.home_team} vs ${m.away_team}
Score: ${m.home_score ?? 0}-${m.away_score ?? 0}
Status: ${selectedMatch._isLive ? `LIVE - ${m.current_minute ?? 'unknown'}' | ${m.period || ''}` : 'FINISHED (Full Time)'}
League: ${m.league?.name || 'unknown'}
--- ATTACK ---
xG: ${m.home_team} ${(m.home_xg_live||0).toFixed(2)} — ${m.away_team} ${(m.away_xg_live||0).toFixed(2)}
Shots: ${hStats.total_shots||0} (${hStats.shots_on_target||0} on target) — ${aStats.total_shots||0} (${aStats.shots_on_target||0} on target)
Key Passes: ${hStats.key_passes||0} — ${aStats.key_passes||0}
Crosses: ${hStats.total_crosses||0} — ${aStats.total_crosses||0}
xA: ${(hStats.expected_assists||0).toFixed(2)} — ${(aStats.expected_assists||0).toFixed(2)}
--- POSSESSION ---
Possession: ${hStats.ball_possession||'?'}% — ${aStats.ball_possession||'?'}%
Passes: ${hStats.total_passes||0} (acc: ${hStats.accurate_passes||0}) — ${aStats.total_passes||0} (acc: ${aStats.accurate_passes||0})
Long Balls: ${hStats.total_long_balls||0} (acc: ${hStats.accurate_long_balls||0}) — ${aStats.total_long_balls||0} (acc: ${aStats.accurate_long_balls||0})
--- SET PIECES & DISCIPLINE ---
Corners: ${hStats.corner_kicks||0} — ${aStats.corner_kicks||0}
Offsides: ${hStats.offsides||0} — ${aStats.offsides||0}
Fouls: ${hStats.fouls||0} — ${aStats.fouls||0}
Yellow Cards: ${hStats.yellow_cards||0} — ${aStats.yellow_cards||0}
Red Cards: ${hStats.red_cards||0} — ${aStats.red_cards||0}
--- DEFENSE & DUELS ---
Tackles Won: ${hStats.won_tackles||0} — ${aStats.won_tackles||0}
Interceptions: ${hStats.interceptions||0} — ${aStats.interceptions||0}
Ball Recovery: ${hStats.ball_recovery||0} — ${aStats.ball_recovery||0}
Aerials Won: ${hStats.aerial_won||0} — ${aStats.aerial_won||0}
Duels Won: ${hStats.duel_won||0} — ${aStats.duel_won||0}
Dispossessed: ${hStats.dispossessed||0} — ${aStats.dispossessed||0}
--- INCIDENTS ---
${incidents.slice(-8).map(i => {
  if(i.type==='goal') return `GOAL ${i.minute}' ${i.player_name||''} (${i.is_home?m.home_team:m.away_team})`;
  if(i.type==='card') return `${i.card_type?.toUpperCase()} CARD ${i.minute}' ${i.player_name||''} (${i.is_home?m.home_team:m.away_team})`;
  if(i.type==='substitution') return `SUB ${i.minute}': ${i.player_in||'?'} on for ${i.player_out||'?'}`;
  return '';
}).filter(Boolean).join(' | ') || 'none yet'}
${customCtx ? `Additional context: ${customCtx}` : ''}
  `.trim();

  const prompt = `You are an expert live football tweet writer. Generate 4 rich, detailed tweets about this ongoing match.

MATCH DATA:
${matchData}

TONE: ${toneGuide[currentTone]}

Generate exactly 4 tweets. Each tweet must be a different TYPE:
1. TYPE "live" - ${selectedMatch._isLive ? 'paint a vivid picture of the current match situation: score, minute, which team is on top and WHY' : 'recap the final result with colour: who dominated, key turning points, what the final score tells us'}
2. TYPE "stat" - take the single most surprising or telling stat from this match and build a tweet around what it reveals about the game
3. TYPE "player" - spotlight a specific player\'s performance with concrete numbers — goals, assists, shots, key passes, defensive actions
4. TYPE "momentum" - ${selectedMatch._isLive ? 'describe the flow and momentum of the match: who has had the better spells, what the xG says vs the scoreline, what might happen next' : 'analyse the xG vs actual score — who deserved the result, where the game was won and lost'}

CRITICAL RULES:
- Each tweet MUST be between 200-270 characters. Use the full space — short tweets are lazy.
- NO hashtags
- ALWAYS use specific numbers and player names from the data — never be vague
- Every tweet must tell a mini story or make a specific argument, not just report a fact
- Reference at least 2-3 stats per tweet to build a complete picture
- Make each tweet feel like it was written by a real passionate football person, not a bot

Respond ONLY with a JSON array — no other text:
[{"type":"live","text":"tweet text here"},{"type":"stat","text":"..."},{"type":"player","text":"..."},{"type":"momentum","text":"..."}]`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${anthropicKey}`
      },
      body: JSON.stringify({
        model: document.getElementById('geminiModel').value,
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 1000,
        temperature: 0.9
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const raw = data.choices?.[0]?.message?.content || '';

    let tweets;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      tweets = JSON.parse(clean);
    } catch(e) {
      const match = raw.match(/\[[\s\S]*\]/);
      if (match) tweets = JSON.parse(match[0]);
      else throw new Error('Could not parse AI response');
    }

    generatedCount += tweets.length;
    document.getElementById('tweetGenCount').textContent = `${generatedCount} tweets generated`;

    const container = document.getElementById('tweetsContainer');

    if (container.querySelector('.empty-state')) {
      container.innerHTML = '';
    }

    const timestamp = new Date().toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit'});

    tweets.forEach(tweet => {
      const len = tweet.text.length;
      const countClass = len > 260 ? 'over' : len > 230 ? 'warn' : '';
      const card = document.createElement('div');
      card.className = 'tweet-card';
      card.innerHTML = `
        <div class="tweet-header">
          <span class="tweet-type ${tweet.type}">${tweet.type}</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto">${timestamp}</span>
        </div>
        <div class="tweet-body">${escHtml(tweet.text)}</div>
        <div class="tweet-footer">
          <span class="char-count ${countClass}">${len}/280</span>
          <div class="tweet-actions">
            <button class="icon-btn" title="Regenerate this tweet" onclick="regenerateSingle(this, ${JSON.stringify(tweet.type).replace(/"/g,'&quot;')})">↻</button>
            <button class="icon-btn" title="Copy to clipboard" onclick="copyTweet(this)">⎘</button>
          </div>
        </div>
      `;
      container.insertBefore(card, container.firstChild);
    });

  } catch(e) {
    const container = document.getElementById('tweetsContainer');
    if (container.querySelector('.empty-state')) container.innerHTML = '';
    const errCard = document.createElement('div');
    errCard.className = 'tweet-card';
    errCard.style.borderColor = 'rgba(255,71,87,0.3)';
    errCard.innerHTML = `<div style="color:var(--red);font-family:'Space Mono',monospace;font-size:12px;padding:4px 0">Error: ${escHtml(e.message)}</div>`;
    container.insertBefore(errCard, container.firstChild);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ Generate Tweets';
  }
}

async function regenerateSingle(btn, type) {
  if (!selectedMatch) return;
  const anthropicKey = document.getElementById('anthropicKey').value.trim();
  if (!anthropicKey) { alert('Please enter your Anthropic API key'); return; }

  const card = btn.closest('.tweet-card');
  const toneGuide = {
    hype: 'ultra hype, passionate, heavy use of caps and emojis',
    analytical: 'analytical and data-driven, reference xG and stats',
    funny: 'funny and witty, sharp football humour',
    pundit: 'professional TV pundit style, authoritative'
  };

  const m = selectedMatch;
  const ls = m.live_stats || {};
  const hStats = ls.home || {};
  const aStats = ls.away || {};

  btn.textContent = '...';
  btn.disabled = true;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${anthropicKey}`
      },
      body: JSON.stringify({
        model: document.getElementById('geminiModel').value,
        messages: [{
          role: 'user',
          content: `Generate a single football tweet of type "${type}" about ${m.home_team} vs ${m.away_team} (${m.home_score??0}-${m.away_score??0}, ${m.current_minute??'--'}').
xG: ${(m.home_xg_live||0).toFixed(2)}-${(m.away_xg_live||0).toFixed(2)}. Possession: ${hStats.ball_possession||'?'}%-${aStats.ball_possession||'?'}%.
Tone: ${toneGuide[currentTone]}. Max 280 chars. No hashtags. Reply ONLY with the tweet text, nothing else.`
        }],
        max_tokens: 300,
        temperature: 1.0
      })
    });

    const data = await response.json();
    const newText = data.choices?.[0]?.message?.content?.trim() || '';
    const bodyEl = card.querySelector('.tweet-body');
    const countEl = card.querySelector('.char-count');
    bodyEl.textContent = newText;
    const len = newText.length;
    countEl.textContent = `${len}/280`;
    countEl.className = 'char-count' + (len > 260 ? ' over' : len > 230 ? ' warn' : '');
  } catch(e) {
    console.error(e);
  } finally {
    btn.textContent = '↻';
    btn.disabled = false;
  }
}

function copyTweet(btn) {
  const text = btn.closest('.tweet-card').querySelector('.tweet-body').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!'));
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function switchMode(mode) {
  document.getElementById('tabMatch').classList.toggle('active', mode === 'match');
  document.getElementById('tabPlayer').classList.toggle('active', mode === 'player');
  document.getElementById('matchMode').style.display = mode === 'match' ? 'flex' : 'none';
  document.getElementById('playerMode').classList.toggle('visible', mode === 'player');
  if (mode === 'player' && selectedMatch) populatePlayerDropdown();
}

async function populatePlayerDropdown() {
  const apiKey = document.getElementById('bsdKey').value.trim();
  if (!apiKey || !selectedMatch) return;
  const sel = document.getElementById('playerSelect');
  const status = document.getElementById('playerLoadStatus');
  status.textContent = 'loading players...';

  try {
    const res = await fetch(`https://sports.bzzoiro.com/api/player-stats/?event=${selectedMatch.id}&limit=50`, {
      headers: { 'Authorization': `Token ${apiKey}` }
    });
    if (!res.ok) throw new Error('Failed to load players');
    const data = await res.json();
    const all = data.results || [];

    // Only players who actually played (minutes_played > 0)
    const players = all.filter(p => p.minutes_played > 0);

    window._playerStats = {};
    players.forEach(p => { window._playerStats[p.player.id] = p; });

    // Sort each team's players by rating desc, then minutes desc as tiebreaker
    const sortPlayers = (list) => list.sort((a, b) => {
      const rA = a.rating ?? 0;
      const rB = b.rating ?? 0;
      if (rB !== rA) return rB - rA;
      return (b.minutes_played ?? 0) - (a.minutes_played ?? 0);
    });

    const home = sortPlayers(players.filter(p => p.player.team === selectedMatch.home_team));
    const away = sortPlayers(players.filter(p => p.player.team === selectedMatch.away_team));

    const ratingLabel = (p) => {
      if (!p.rating) return '';
      const r = p.rating.toFixed(1);
      const stars = p.rating >= 8 ? ' 🔥' : p.rating >= 7 ? ' ✦' : '';
      return ` · ${r}${stars}`;
    };

    sel.innerHTML = '<option value="">— select a player —</option>';

    if (home.length) {
      const og = document.createElement('optgroup');
      og.label = `${selectedMatch.home_team} (${home.length} played)`;
      home.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.player.id;
        opt.textContent = `${p.player.name} (${p.player.position}) · ${p.minutes_played}'${ratingLabel(p)}`;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    }

    if (away.length) {
      const og = document.createElement('optgroup');
      og.label = `${selectedMatch.away_team} (${away.length} played)`;
      away.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.player.id;
        opt.textContent = `${p.player.name} (${p.player.position}) · ${p.minutes_played}'${ratingLabel(p)}`;
        og.appendChild(opt);
      });
      sel.appendChild(og);
    }

    const total = home.length + away.length;
    status.textContent = `${total} players · rated ↓`;
  } catch(e) {
    status.textContent = 'Error loading players';
  }
}

function loadPlayerStats() {
  const pid = document.getElementById('playerSelect').value;
  if (!pid) {
    document.getElementById('playerInfoBar').style.display = 'none';
    document.getElementById('playerStatsGrid').style.display = 'none';
    return;
  }
  const ps = window._playerStats?.[pid];
  if (!ps) return;

  const p = ps.player;
  const posClass = { G:'pos-g', D:'pos-d', M:'pos-m', F:'pos-f' }[p.position] || '';
  const posLabel = { G:'Goalkeeper', D:'Defender', M:'Midfielder', F:'Forward' }[p.position] || p.position;

  document.getElementById('playerInfoBar').style.display = 'flex';
  document.getElementById('playerInfoBar').innerHTML = `
    <div class="player-name-display">${p.name}</div>
    <div class="player-badge ${posClass}">${posLabel}</div>
    <div class="player-badge">${p.team}</div>
    ${ps.rating ? `<div class="player-badge" style="border-color:rgba(255,176,0,0.4);color:var(--amber)">★ ${ps.rating.toFixed(1)}</div>` : ''}
    <div class="player-badge">${ps.minutes_played}' played</div>
  `;

  // Build stat cards — only show non-zero / meaningful ones
  const statDefs = [
    { key: 'goals', label: 'Goals', highlight: true },
    { key: 'goal_assist', label: 'Assists', highlight: true },
    { key: 'expected_goals', label: 'xG', fmt: v => v.toFixed(2), highlight: true },
    { key: 'expected_assists', label: 'xA', fmt: v => v.toFixed(2) },
    { key: 'total_shots', label: 'Shots' },
    { key: 'shots_on_target', label: 'On Target' },
    { key: 'total_pass', label: 'Passes' },
    { key: 'accurate_pass', label: 'Acc. Pass' },
    { key: 'key_pass', label: 'Key Passes', highlight: true },
    { key: 'total_cross', label: 'Crosses' },
    { key: 'accurate_cross', label: 'Acc. Cross' },
    { key: 'duel_won', label: 'Duels Won' },
    { key: 'duel_lost', label: 'Duels Lost' },
    { key: 'aerial_won', label: 'Aerials Won' },
    { key: 'aerial_lost', label: 'Aerials Lost' },
    { key: 'total_tackle', label: 'Tackles' },
    { key: 'won_tackle', label: 'Tackles Won' },
    { key: 'interception', label: 'Interceptions' },
    { key: 'ball_recovery', label: 'Recoveries' },
    { key: 'total_clearance', label: 'Clearances' },
    { key: 'fouls', label: 'Fouls' },
    { key: 'was_fouled', label: 'Was Fouled' },
    { key: 'yellow_card', label: 'Yellow' },
    { key: 'red_card', label: 'Red' },
    { key: 'dispossessed', label: 'Dispossessed' },
    { key: 'touches', label: 'Touches' },
    { key: 'saves', label: 'Saves' },
    { key: 'goals_conceded', label: 'Goals Conceded' },
    { key: 'penalty_save', label: 'Pen. Saves', highlight: true },
    { key: 'penalty_won', label: 'Pen. Won', highlight: true },
  ];

  const cards = statDefs
    .filter(s => ps[s.key] != null && ps[s.key] !== 0)
    .map(s => {
      const val = s.fmt ? s.fmt(ps[s.key]) : ps[s.key];
      return `<div class="player-stat-card">
        <div class="psc-val ${s.highlight ? 'highlight' : ''}">${val}</div>
        <div class="psc-label">${s.label}</div>
      </div>`;
    }).join('');

  const grid = document.getElementById('playerStatsGrid');
  grid.style.display = cards ? 'grid' : 'none';
  grid.innerHTML = cards || '';
}

async function generatePlayerTweets() {
  const pid = document.getElementById('playerSelect').value;
  if (!pid) { alert('Please select a player first'); return; }
  const groqKey = document.getElementById('anthropicKey').value.trim();
  if (!groqKey) { alert('Please enter your Groq API key'); return; }

  const ps = window._playerStats?.[pid];
  if (!ps) return;
  const p = ps.player;
  const m = selectedMatch;
  const customCtx = document.getElementById('playerCustomContext').value.trim();

  const btn = document.getElementById('playerGenBtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

  const posLabel = { G:'Goalkeeper', D:'Defender', M:'Midfielder', F:'Forward' }[p.position] || p.position;
  const matchCtx = `${m.home_team} ${m.home_score??0}-${m.away_score??0} ${m.away_team} (${selectedMatch._isLive ? `LIVE ${m.current_minute??'--'}'` : 'FT'})`;

  const playerData = `
Player: ${p.name} (${posLabel}) — ${p.team}
Match: ${matchCtx}
League: ${m.league?.name || ''}
Rating: ${ps.rating ? ps.rating.toFixed(1) + '/10' : 'N/A'}
Minutes Played: ${ps.minutes_played}
--- ATTACKING ---
Goals: ${ps.goals||0} | Assists: ${ps.goal_assist||0} | xG: ${ps.expected_goals ? ps.expected_goals.toFixed(2) : '0.00'} | xA: ${ps.expected_assists ? ps.expected_assists.toFixed(2) : '0.00'}
Shots: ${ps.total_shots||0} (${ps.shots_on_target||0} on target)
Key Passes: ${ps.key_pass||0} | Crosses: ${ps.total_cross||0} (${ps.accurate_cross||0} accurate)
--- PASSING ---
Passes: ${ps.total_pass||0} (${ps.accurate_pass||0} accurate${ps.total_pass ? ', ' + Math.round(ps.accurate_pass/ps.total_pass*100) + '% acc' : ''})
--- DEFENDING ---
Tackles: ${ps.total_tackle||0} (${ps.won_tackle||0} won) | Interceptions: ${ps.interception||0}
Aerials: ${ps.aerial_won||0} won / ${ps.aerial_lost||0} lost | Clearances: ${ps.total_clearance||0}
Ball Recoveries: ${ps.ball_recovery||0}
--- DUELS & DISCIPLINE ---
Duels: ${ps.duel_won||0} won / ${ps.duel_lost||0} lost
Fouls: ${ps.fouls||0} committed / ${ps.was_fouled||0} suffered
Yellow: ${ps.yellow_card||0} | Red: ${ps.red_card||0} | Dispossessed: ${ps.dispossessed||0}
Touches: ${ps.touches||0}
${p.position === 'G' ? `--- GOALKEEPER ---
Saves: ${ps.saves||0} | Goals Conceded: ${ps.goals_conceded||0} | Penalty Saves: ${ps.penalty_save||0}` : ''}
${customCtx ? 'Additional context: ' + customCtx : ''}
  `.trim();

  const toneGuide = {
    hype: 'ultra hype fan energy — CAPS, emojis, dramatic. Celebrate or roast the performance.',
    analytical: 'data-driven analyst — xG, pass accuracy, defensive numbers. Explain what the stats mean tactically.',
    funny: 'sharp football banter and wit — funny observations about the stats, relatable fan reactions.',
    pundit: 'authoritative pundit — bold verdict on the performance, backed by specific numbers.'
  };

  const prompt = `You are an expert football tweet writer. Generate 4 tweets focused on this specific player's performance.

PLAYER DATA:
${playerData}

TONE: ${toneGuide[currentTone]}

Generate exactly 4 tweets, each a different TYPE:
1. TYPE "rating" — overall verdict on the player's performance with their rating and 2-3 key stats
2. TYPE "attack" — focused on their attacking contribution: goals, xG, shots, key passes, assists
3. TYPE "defense" — focused on their defensive/physical work: tackles, interceptions, aerials, duels
4. TYPE "moment" — pick the single most interesting or surprising stat about this player and build a tweet around it

CRITICAL RULES:
- Each tweet MUST be 200-270 characters. Use the full space.
- NO hashtags
- Use specific numbers — never be vague
- Every tweet must make a point or tell a story about this player
- Reference the match context (score, opponent) to give it meaning
- Sound like a real football fan or journalist, not a bot

Respond ONLY with a JSON array:
[{"type":"rating","text":"..."},{"type":"attack","text":"..."},{"type":"defense","text":"..."},{"type":"moment","text":"..."}]`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
      body: JSON.stringify({
        model: document.getElementById('geminiModel').value,
        messages: [{ role: 'user', content: prompt }],
        max_tokens: 1000,
        temperature: 0.9
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API error ${response.status}`);
    }

    const data = await response.json();
    const raw = data.choices?.[0]?.message?.content || '';

    let tweets;
    try {
      const clean = raw.replace(/```json|```/g, '').trim();
      tweets = JSON.parse(clean);
    } catch(e) {
      const match = raw.match(/\[[\s\S]*\]/);
      if (match) tweets = JSON.parse(match[0]);
      else throw new Error('Could not parse AI response');
    }

    const container = document.getElementById('playerTweetsContainer');
    if (container.querySelector('.empty-state')) container.innerHTML = '';
    const timestamp = new Date().toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'});

    tweets.forEach(tweet => {
      const len = tweet.text.length;
      const countClass = len > 260 ? 'over' : len > 230 ? 'warn' : '';
      const card = document.createElement('div');
      card.className = 'tweet-card';
      card.innerHTML = `
        <div class="tweet-header">
          <span class="tweet-type player">${tweet.type}</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-left:6px">${p.name}</span>
          <span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto">${timestamp}</span>
        </div>
        <div class="tweet-body">${escHtml(tweet.text)}</div>
        <div class="tweet-footer">
          <span class="char-count ${countClass}">${len}/280</span>
          <div class="tweet-actions">
            <button class="icon-btn" title="Copy" onclick="copyTweet(this)">⎘</button>
          </div>
        </div>
      `;
      container.insertBefore(card, container.firstChild);
    });

  } catch(e) {
    const container = document.getElementById('playerTweetsContainer');
    if (container.querySelector('.empty-state')) container.innerHTML = '';
    const errCard = document.createElement('div');
    errCard.className = 'tweet-card';
    errCard.style.borderColor = 'rgba(255,71,87,0.3)';
    errCard.innerHTML = `<div style="color:var(--red);font-family:'Space Mono',monospace;font-size:12px;">Error: ${escHtml(e.message)}</div>`;
    container.insertBefore(errCard, container.firstChild);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✦ Generate Tweets';
  }
}
</script>
